<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/favicon.png">
  <title>Logs - HubSpot Fusionador</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <h1>Logs del Sistema</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" id="refreshBtn">↻ Actualizar</button>
        <a href="/dashboard.html" class="btn btn-outline">Volver al Dashboard</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Usuario</th>
              <th>Proyecto</th>
              <th>Acción</th>
              <th>Estado</th>
              <th>Mensaje</th>
            </tr>
          </thead>
          <tbody id="logsTable">
            <tr><td colspan="6" class="loading">Cargando…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="logs-footer">Actualización automática cada 10 segundos</div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    async function loadLogs() {
      try {
        const { logs } = await API.getLogs({ limit: 200 });
        document.getElementById('logsTable').innerHTML = logs.map((l) => `
          <tr>
            <td>${formatDate(l.created_at)}</td>
            <td>${escapeHtml(l.username || '-')}</td>
            <td>${escapeHtml(l.project_name || '-')}</td>
            <td>${escapeHtml(l.action)}</td>
            <td>${statusBadge(l.status)}</td>
            <td>${escapeHtml(l.message)}</td>
          </tr>
        `).join('') || '<tr><td colspan="6">Sin logs</td></tr>';
      } catch (err) {
        document.getElementById('logsTable').innerHTML =
          `<tr><td colspan="6">Error: ${escapeHtml(err.message)}</td></tr>`;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    async function init() {
      await requireAuth();
      document.getElementById('refreshBtn').onclick = loadLogs;
      await loadLogs();
      setInterval(loadLogs, 10000);
    }

    init();
  </script>
</body>
</html>
