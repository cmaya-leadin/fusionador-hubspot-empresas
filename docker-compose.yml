services:
  fusionador:
    build: .
    image: hubspot-fusionador:latest
    container_name: hubspot-fusionador
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      # Pon true solo si accedes por HTTPS (proxy con TLS)
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-true}
    volumes:
      - fusionador_data:/app/data
      - fusionador_output:/app/output
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  fusionador_data:
  fusionador_output:
