# Stack para Portainer (sin archivo .env en el servidor)
#
# OPCIÓN 1 — Variables en Portainer (recomendado):
#   Al crear/editar el stack, despliega "Environment variables" y añade:
#     SESSION_SECRET=tu-secreto-largo
#     ADMIN_PASSWORD=tu-password
#
# OPCIÓN 2 — Sin variables extra:
#   El stack arranca con valores por defecto (admin/admin y secreto genérico).
#   Cámbialos en Environment variables y redeploy cuanto antes.

services:
  fusionador:
    build:
      context: .
      dockerfile: Dockerfile
    image: hubspot-fusionador:latest
    container_name: hubspot-fusionador
    restart: unless-stopped
    ports:
      - "${PORT:-3080}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      SESSION_SECRET: ${SESSION_SECRET:-fusionador-cambiar-secreto-en-portainer}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-auto}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      MERGE_DELAY_MS: ${MERGE_DELAY_MS:-1000}
      MERGE_SETTLE_MS: ${MERGE_SETTLE_MS:-2000}
      MERGE_MAX_ATTEMPTS: ${MERGE_MAX_ATTEMPTS:-5}
    volumes:
      - fusionador_data:/app/data
      - fusionador_output:/app/output
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  fusionador_data:
  fusionador_output:
