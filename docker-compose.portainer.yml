# Stack para Portainer — NO requiere archivo .env en el servidor.
# Define estas variables en Portainer: Stacks → tu stack → Editor → "Environment variables"
#
# Obligatorias:
#   SESSION_SECRET=genera-un-secreto-largo-aleatorio
#   ADMIN_PASSWORD=tu-password-admin
#
# Opcionales (ya tienen valor por defecto en el compose):
#   PORT=3000
#   SESSION_COOKIE_SECURE=false
#   TRUST_PROXY=true
#   MERGE_DELAY_MS=1000
#   MERGE_SETTLE_MS=2000
#   MERGE_MAX_ATTEMPTS=5

services:
  fusionador:
    build:
      context: .
      dockerfile: Dockerfile
    image: hubspot-fusionador:latest
    container_name: hubspot-fusionador
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      SESSION_SECRET: ${SESSION_SECRET:?Define SESSION_SECRET en las variables del stack}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Define ADMIN_PASSWORD en las variables del stack}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      MERGE_DELAY_MS: ${MERGE_DELAY_MS:-1000}
      MERGE_SETTLE_MS: ${MERGE_SETTLE_MS:-2000}
      MERGE_MAX_ATTEMPTS: ${MERGE_MAX_ATTEMPTS:-5}
    volumes:
      - fusionador_data:/app/data
      - fusionador_output:/app/output
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  fusionador_data:
  fusionador_output:
